<!DOCTYPE html>
<html lang="en">

<head>

<link href="https://fonts.googleapis.com/css2?family=Prata&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<meta charset="UTF-8">
<title>Teacher Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Prata','Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#e3d2ab,#a5b3c4);
    display:flex;
    min-height:100vh;
}

/* Sidebar */

.sidebar{
    width:350px;
    background:#001D39;
    color:white;
    padding-top:25px;
    position:fixed;
    height:100%;
    overflow-y:auto;
}

.sidebar h2{
    text-align:center;
    margin-bottom:20px;
}

.sidebar a{
    display:block;
    padding:14px 25px;
    color:#cbd5e1;
    text-decoration:none;
    transition:.3s;
}

.sidebar a:hover{
    background:#1a62a5;
    color:white;
}

/* Evidence */

.evidence-section{
    padding:15px;
}

.evidence-section h3{
    margin-bottom:10px;
    border-bottom:1px solid #334;
    padding-bottom:5px;
}

.evidence-box{
    max-height:300px;
    overflow-y:auto;
}

.evidence-item{
    margin-bottom:12px;
}

.evidence-item img{
    width:100%;
    border-radius:8px;
    border:2px solid #0f4b84;
}

.evidence-item small{
    font-size:11px;
    color:#ccc;
}

/* Main */

.main{
    margin-left:360px;
    padding:40px;
    width:100%;
    text-align:center;
}

.title{
    font-size:40px;
    color:#001D39;
    margin-bottom:10px;
    animation:pop 0.8s ease;
}

.subtitle{
    color:#0f4b84;
    margin-bottom:40px;
}

@keyframes pop{
    from{transform:scale(0.7);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

.features{
    display:flex;
    justify-content:center;
    gap:25px;
    margin-bottom:50px;
}

.feature-card{
    background:#f2f4f7;
    padding:25px;
    border-radius:18px;
    width:250px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    transition:.3s;
    font-size:18px;
    font-weight:600;
}

.feature-card:hover{
    transform:translateY(-10px) scale(1.05);
}

.live-section{
    margin-top:40px;
}

.live-title{
    font-size:26px;
    margin-bottom:20px;
    color:#001D39;
}

.video-container{
    display:flex;
    justify-content:center;
}

.video-container img{
    width:750px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

.live-badge{
    display:inline-block;
    background:red;
    color:white;
    padding:5px 12px;
    border-radius:20px;
    font-size:14px;
    margin-left:10px;
    animation:blink 1s infinite;
}

@keyframes blink{
    0%{opacity:1;}
    50%{opacity:0.3;}
    100%{opacity:1;}
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h2>Teacher Panel</h2>

<a href="/dashboard">Dashboard</a>
<a href="/students">Students</a>
<a href="/register">Register</a>
<a href="/logout">Logout</a>

<!-- Evidence -->

<div class="evidence-section">

<h3> Evidence</h3>

<div class="evidence-box" id="evidence-container">

{% for file in evidence_files %}
<div class="evidence-item">
    <img src="/evidence/{{ file }}">
    <small>{{ file }}</small>
</div>
{% endfor %}

</div>

</div>

</div>

<!-- Main -->

<div class="main">

<h1 class="title">Exam Hall Management</h1>
<p class="subtitle">Advanced AI Malpractice Detection System</p>

<div class="features">
    <div class="feature-card">🔒 Secure Monitoring</div>
    <div class="feature-card">📊 AI Analytics</div>
    <div class="feature-card">👨‍🎓 Student Management</div>
</div>

<div class="live-section">

<h2 class="live-title">
🎥 Live Exam Monitoring
<span class="live-badge">LIVE</span>
</h2>

<div class="video-container">
    <img src="{{ url_for('video_feed') }}">
</div>



</div>

</div>

<script>

function updateRisk() {
    fetch('/risk_score')
    .then(response => response.json())
    .then(data => {
        const riskEl = document.getElementById('risk-level');
        riskEl.textContent = data.risk;
        riskEl.style.color = data.color;
    });
}

/* Evidence Auto Refresh */

function updateEvidence(){
    fetch('/dashboard')
    .then(res => res.text())
    .then(html => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const newEvidence = doc.getElementById('evidence-container').innerHTML;
        document.getElementById('evidence-container').innerHTML = newEvidence;
    });
}

setInterval(updateRisk, 500);
setInterval(updateEvidence, 5000);

</script>

</body>
</html>
